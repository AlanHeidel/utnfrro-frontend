<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Steak House. Disfruta de una experiencia culinaria única con nuestro menú variado y ambiente acogedor. ¡Ven y ordena ahora!">
    <title>Steak House</title>
    <link rel="icon" href="favicon.png?v=2" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
</head>

<body>

    <div class="content">

        <nav class="navbar">
            <ul>
                <a href="index.html" class="logo">
                    <img src="images/home-icon.avif" alt="Logo del restaurante" />
                </a>
                <div class="nav-menu">
                    <label class="bar" for="check">
                        <input type="checkbox" id="check">
                            <span class="top"></span>
                            <span class="middle"></span>
                            <span class="bottom"></span>
                    </label>
                </div>

                <div class="navbar-list">
                    <li><a href="#">Menú</a></li>
                    <li><a href="#">Recomendados</a></li>
                    <li><a href="index.html#aboutus">Nosotros</a></li>
                    <li class="right-align">    
                        <a class="reserve-button" href="#">
                            Reservá una mesa
                        </a>
                    </li>
                </div>
                
            </ul>
        </nav>


        <main>

        <section class="menu-scroll-content">
            <h2>Menú</h2>
        </section>

        <footer class="footer">
            <section class="footer-aboutus">
                <h3>Sobre Nosotros</h3>
                <a href="#">Restaurantes</a>
                <a href="#">Quienes somos</a>
                <a href="#">Trabaja con nosotros</a>
            </section>
            <section class="footer-help">
                <h3 >Ayuda</h3>
                <a href="#">Preguntas frecuentes</a>
                <a href="#">Ayuda con un pago</a>
                <a href="#">Términos y condiciones</a>
            </section>
            <section class="footer-contact">
                <h3>Contacto</h3>
                <p>Encontranos en nuestras redes sociales</p>
                <div class="footer-social">
                    <a href="https://facebook.com/" target="_blank" aria-label="Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="https://instagram.com/" target="_blank" aria-label="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://twitter.com/" target="_blank" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="https://wa.me/123456789" target="_blank" aria-label="WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </section>
            
        </footer>
    </div>

<script src="js/main.js"></script>

</body>
</html>
